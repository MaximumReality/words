<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAXIMUM REALITY: WORD CHAOS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  :root {
    --pink: #ff00ff;
    --cyan: #00ffff;
    --yellow: #ffff00;
    --dark: #060610;
    --mid: #0d0d1a;
    --grid-bg: #0a0a14;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding-bottom: 20px;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,255,0.015) 2px,
      rgba(0,255,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  #header {
    text-align: center;
    padding: 14px 10px 6px;
    width: 100%;
  }

  #title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.9rem, 4vw, 1.3rem);
    font-weight: 900;
    color: var(--pink);
    text-shadow: 0 0 10px var(--pink), 0 0 30px var(--pink);
    letter-spacing: 3px;
    animation: titleFlicker 4s infinite;
  }

  #subtitle {
    font-size: 0.6rem;
    color: var(--cyan);
    opacity: 0.7;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  @keyframes titleFlicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.3; }
    97% { opacity: 1; }
    98% { opacity: 0.5; }
  }

  /* Stats bar */
  #stats {
    display: flex;
    justify-content: space-around;
    align-items: center;
    width: 100%;
    max-width: 420px;
    padding: 8px 16px;
    margin: 6px 0;
    background: rgba(255,0,255,0.07);
    border-top: 1px solid rgba(255,0,255,0.3);
    border-bottom: 1px solid rgba(255,0,255,0.3);
  }

  .stat-block { text-align: center; }
  .stat-label { font-size: 0.55rem; color: var(--pink); letter-spacing: 2px; opacity: 0.8; }
  .stat-value { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

  /* Timer bar */
  #timer-wrap {
    width: 100%;
    max-width: 420px;
    padding: 0 16px;
    margin-bottom: 4px;
  }

  #timer-bar-bg {
    width: 100%;
    height: 6px;
    background: rgba(0,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid rgba(0,255,255,0.2);
  }

  #timer-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--pink));
    border-radius: 3px;
    transition: width 0.1s linear, background 0.5s;
  }

  #timer-bar.danger {
    background: linear-gradient(90deg, #ff4400, var(--pink));
    animation: dangerPulse 0.3s infinite alternate;
  }

  @keyframes dangerPulse {
    from { opacity: 1; }
    to { opacity: 0.5; }
  }

  /* Current word display */
  #word-display-wrap {
    width: 100%;
    max-width: 420px;
    padding: 6px 16px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #word-display {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    font-weight: 700;
    color: var(--yellow);
    text-shadow: 0 0 15px var(--yellow);
    letter-spacing: 6px;
    min-height: 2rem;
    transition: all 0.1s;
  }

  #word-display.valid { color: #00ff88; text-shadow: 0 0 20px #00ff88; }
  #word-display.invalid { color: #ff4444; text-shadow: 0 0 10px #ff4444; animation: shake 0.3s; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Letter grid */
  #grid-wrap {
    position: relative;
    margin: 4px auto;
  }

  #letter-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 14px;
    background: var(--grid-bg);
    border: 2px solid var(--pink);
    box-shadow: 0 0 20px rgba(255,0,255,0.3), inset 0 0 30px rgba(0,0,0,0.5);
    border-radius: 4px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .letter-cell {
    width: clamp(54px, 14vw, 68px);
    height: clamp(54px, 14vw, 68px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.1rem, 4vw, 1.4rem);
    font-weight: 900;
    color: var(--cyan);
    background: rgba(0,255,255,0.04);
    border: 1.5px solid rgba(0,255,255,0.25);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.08s;
    position: relative;
    text-shadow: 0 0 8px var(--cyan);
  }

  .letter-cell:active { transform: scale(0.92); }

  .letter-cell.selected {
    background: rgba(255,0,255,0.25);
    border-color: var(--pink);
    color: var(--pink);
    text-shadow: 0 0 12px var(--pink);
    transform: scale(1.08);
    z-index: 2;
  }

  .letter-cell.first-selected {
    background: rgba(255,255,0,0.2);
    border-color: var(--yellow);
    color: var(--yellow);
    text-shadow: 0 0 12px var(--yellow);
  }

  .letter-cell.adjacent-hint {
    border-color: rgba(0,255,255,0.6);
    background: rgba(0,255,255,0.08);
  }

  /* Selection order number */
  .letter-cell.selected::after {
    content: attr(data-order);
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 0.5rem;
    color: var(--pink);
    opacity: 0.8;
  }

  /* SVG connector lines */
  #connector-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* Control buttons */
  #controls {
    display: flex;
    gap: 12px;
    margin: 8px 0;
    align-items: center;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 10px 18px;
    border: 2px solid;
    background: transparent;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-submit {
    border-color: var(--cyan);
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan);
    box-shadow: 0 0 10px rgba(0,255,255,0.2);
  }
  .btn-submit:hover, .btn-submit:active {
    background: rgba(0,255,255,0.15);
    box-shadow: 0 0 20px rgba(0,255,255,0.5);
  }

  .btn-clear {
    border-color: rgba(255,0,255,0.5);
    color: rgba(255,0,255,0.8);
  }
  .btn-clear:hover, .btn-clear:active {
    background: rgba(255,0,255,0.1);
  }

  .btn-shuffle {
    border-color: rgba(255,255,0,0.5);
    color: rgba(255,255,0,0.8);
  }
  .btn-shuffle:hover, .btn-shuffle:active {
    background: rgba(255,255,0,0.1);
  }

  /* Found words list */
  #found-section {
    width: 100%;
    max-width: 420px;
    padding: 6px 16px;
  }

  #found-label {
    font-size: 0.55rem;
    color: var(--pink);
    letter-spacing: 3px;
    margin-bottom: 6px;
    opacity: 0.8;
  }

  #found-words {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 30px;
  }

  .found-word {
    font-size: 0.7rem;
    padding: 3px 8px;
    border: 1px solid;
    border-radius: 2px;
    animation: wordPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes wordPop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .found-3 { border-color: rgba(0,255,255,0.4); color: var(--cyan); }
  .found-4 { border-color: rgba(255,0,255,0.5); color: var(--pink); }
  .found-5 { border-color: rgba(255,255,0,0.6); color: var(--yellow); text-shadow: 0 0 6px var(--yellow); }
  .found-6plus { border-color: #00ff88; color: #00ff88; text-shadow: 0 0 8px #00ff88; }

  /* Status message */
  #status-msg {
    font-size: 0.65rem;
    letter-spacing: 2px;
    min-height: 1.2rem;
    color: var(--pink);
    text-align: center;
    margin: 2px 0;
    text-transform: uppercase;
  }

  /* Game Over / Round Over overlay */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 500;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    padding: 20px;
  }

  #overlay.active { display: flex; }

  #overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 6vw, 2.2rem);
    font-weight: 900;
    color: var(--pink);
    text-shadow: 0 0 20px var(--pink), 0 0 60px var(--pink);
    animation: titleFlicker 2s infinite;
  }

  #overlay-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    color: var(--cyan);
  }

  #overlay-words {
    font-size: 0.7rem;
    color: rgba(0,255,255,0.7);
    max-width: 320px;
    line-height: 1.8;
  }

  #overlay-cat {
    font-size: 3rem;
    animation: catBounce 0.6s infinite alternate;
  }

  @keyframes catBounce {
    from { transform: translateY(0) rotate(-5deg); }
    to { transform: translateY(-10px) rotate(5deg); }
  }

  /* Score flash */
  .score-flash {
    position: fixed;
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    pointer-events: none;
    z-index: 200;
    animation: floatUp 1s forwards;
  }

  @keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-80px); opacity: 0; }
  }

  /* Glitch flash on big word */
  @keyframes glitchFlash {
    0%,100% { background: var(--dark); }
    25% { background: rgba(255,0,255,0.15); }
    50% { background: rgba(0,255,255,0.1); }
    75% { background: rgba(255,255,0,0.08); }
  }

  body.glitching { animation: glitchFlash 0.4s; }

  /* Round indicator */
  #round-info {
    font-size: 0.6rem;
    color: rgba(255,0,255,0.6);
    letter-spacing: 2px;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div id="header">
  <div id="title">MAXIMUM REALITY: WORD CHAOS</div>
  <div id="subtitle">// AZUL & MOCHKIL'S LEXICON ENGINE //</div>
  <div id="round-info">ROUND <span id="round-num">1</span> &nbsp;|&nbsp; WORDS NEEDED: <span id="words-needed">5</span></div>
</div>

<div id="stats">
  <div class="stat-block">
    <div class="stat-label">SCORE</div>
    <div class="stat-value" id="score-disp">0</div>
  </div>
  <div class="stat-block">
    <div class="stat-label">BEST</div>
    <div class="stat-value" id="best-disp">0</div>
  </div>
  <div class="stat-block">
    <div class="stat-label">FOUND</div>
    <div class="stat-value" id="found-count">0</div>
  </div>
</div>

<div id="timer-wrap">
  <div id="timer-bar-bg"><div id="timer-bar"></div></div>
</div>

<div id="word-display-wrap">
  <div id="word-display">&nbsp;</div>
</div>

<div id="grid-wrap">
  <svg id="connector-svg"></svg>
  <div id="letter-grid"></div>
</div>

<div id="controls">
  <button class="btn btn-clear" onclick="clearSelection()">CLEAR</button>
  <button class="btn btn-submit" onclick="submitWord()">SUBMIT</button>
  <button class="btn btn-shuffle" onclick="shuffleBoard()">SHUFFLE</button>
</div>

<div id="status-msg">SELECT ADJACENT LETTERS TO BUILD WORDS</div>

<div id="found-section">
  <div id="found-label">// WORDS FOUND //</div>
  <div id="found-words"></div>
</div>

  <div style="text-align: center; width: 100%; max-width: 420px;">
  <a href="https://maximumreality.xyz/" 
     style="display:inline-block; margin-top:15px; background:var(--cyan); color:var(--dark); padding:10px 25px; border-radius:4px; font-family:'Orbitron', sans-serif; font-size:0.7rem; font-weight:900; text-decoration:none; cursor:pointer; border:1px solid var(--pink); box-shadow: 0 0 10px rgba(0,255,255,0.3); text-transform:uppercase; letter-spacing:2px;">
    🏙️ Back to Mainframe
  </a>
</div>

<!-- Overlay -->
<div id="overlay">
  <div id="overlay-cat">🐱</div>
  <div id="overlay-title" id="overlay-title-text">ROUND CLEAR!</div>
  <div id="overlay-score"></div>
  <div id="overlay-words"></div>
  <button class="btn btn-submit" onclick="nextRound()" style="margin-top:10px;" id="overlay-btn">NEXT ROUND</button>
</div>

<script>
// ── WORD LIST (common 3-8 letter English words) ──────────────────────────
// WORD_LIST loaded from dictionary.json
let WORD_LIST = new Set();

// ── GAME STATE ───────────────────────────────────────────────────────────
const GRID_SIZE = 4;
const ROUND_WORDS_NEEDED = [5, 6, 7, 8, 9];
const BASE_TIME = 90; // seconds per round

let letters = [];
let selected = [];
let foundWords = new Set();
let score = 0;
let highScore = parseInt(localStorage.getItem('wordchaos_hs') || '0');
let round = 1;
let timerInterval = null;
let timeLeft = 0;
let gameOver = false;

  function startRound() {
    // Other setup logic...
    timeLeft = BASE_TIME; // This sets the clock to 90 every time
    updateTimerDisplay(); 
    // Start interval logic...
}


// Weighted letter distribution (more vowels, common consonants)
const LETTER_POOL = "AAAAAAAAABBBCCCDDDDEEEEEEEEEEFFFGGGHHHIIIIIIIIJKLLLLMMMNNNNNNOOOOOOOOPPPPQRRRRRRSSSSTTTTTTTUUUUVVWWXYYZ";

function randomLetter() {
  return LETTER_POOL[Math.floor(Math.random() * LETTER_POOL.length)];
}

// ── BOARD SETUP ──────────────────────────────────────────────────────────
function generateBoard() {
  letters = [];
  for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
    letters.push(randomLetter());
  }
  // Ensure at least 4 vowels
  const vowels = 'AEIOU';
  let vowelCount = letters.filter(l => vowels.includes(l)).length;
  while (vowelCount < 4) {
    const idx = Math.floor(Math.random() * letters.length);
    if (!vowels.includes(letters[idx])) {
      letters[idx] = vowels[Math.floor(Math.random() * vowels.length)];
      vowelCount++;
    }
  }
}

function renderGrid() {
  const grid = document.getElementById('letter-grid');
  grid.innerHTML = '';
  letters.forEach((letter, i) => {
    const cell = document.createElement('div');
    cell.className = 'letter-cell';
    cell.textContent = letter;
    cell.dataset.idx = i;
    cell.addEventListener('click', () => handleCellClick(i));
    // Touch drag support
    cell.addEventListener('touchstart', handleTouchStart, { passive: false });
    cell.addEventListener('touchmove', handleTouchMove, { passive: false });
    cell.addEventListener('touchend', handleTouchEnd, { passive: false });
    grid.appendChild(cell);
  });
}

// ── ADJACENCY ────────────────────────────────────────────────────────────
function getRow(idx) { return Math.floor(idx / GRID_SIZE); }
function getCol(idx) { return idx % GRID_SIZE; }

function isAdjacent(a, b) {
  const dr = Math.abs(getRow(a) - getRow(b));
  const dc = Math.abs(getCol(a) - getCol(b));
  return dr <= 1 && dc <= 1 && !(dr === 0 && dc === 0);
}

// ── SELECTION ────────────────────────────────────────────────────────────
function handleCellClick(idx) {
  if (gameOver) return;
  
  // If already selected at a non-last position, ignore
  const posInSelected = selected.indexOf(idx);
  
  if (posInSelected !== -1) {
    // Clicked already-selected: trim back to this point
    selected = selected.slice(0, posInSelected + 1);
    updateSelectionUI();
    return;
  }
  
  // Must be adjacent to last selected
  if (selected.length > 0) {
    const last = selected[selected.length - 1];
    if (!isAdjacent(last, idx)) {
      setStatus("NOT ADJACENT — PICK A NEIGHBORING CELL");
      shakeWordDisplay();
      return;
    }
  }
  
  selected.push(idx);
  updateSelectionUI();
}

let isDragging = false;
let dragVisited = new Set();

function handleTouchStart(e) {
  if (e.cancelable) e.preventDefault();
  isDragging = true;
  dragVisited = new Set();
  const idx = parseInt(e.currentTarget.dataset.idx);
  selected = [];
  dragVisited.add(idx);
  selected.push(idx);
  updateSelectionUI();
}

function handleTouchMove(e) {
  if (!isDragging || e.cancelable) {
    if (e.cancelable) e.preventDefault();
  }
  const touch = e.touches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (el && el.classList.contains('letter-cell')) {
    const idx = parseInt(el.dataset.idx);
    if (!dragVisited.has(idx) && selected.length > 0) {
      const last = selected[selected.length - 1];
      if (isAdjacent(last, idx)) {
        dragVisited.add(idx);
        selected.push(idx);
        updateSelectionUI();
      }
    }
  }
}

function handleTouchEnd(e) {
  isDragging = false;
  if (selected.length >= 3) {
    submitWord();
  }
}

function updateSelectionUI() {
  const cells = document.querySelectorAll('.letter-cell');
  
  // Reset all
  cells.forEach(c => {
    c.classList.remove('selected', 'first-selected', 'adjacent-hint');
    c.removeAttribute('data-order');
  });
  
  // Highlight selected
  selected.forEach((idx, order) => {
    cells[idx].classList.add(order === 0 ? 'first-selected' : 'selected');
    cells[idx].dataset.order = order + 1;
  });
  
  // Show adjacent hints for last cell
  if (selected.length > 0) {
    const last = selected[selected.length - 1];
    cells.forEach((cell, idx) => {
      if (!selected.includes(idx) && isAdjacent(last, idx)) {
        cell.classList.add('adjacent-hint');
      }
    });
  }
  
  // Update word display
  const word = selected.map(i => letters[i]).join('');
  const wd = document.getElementById('word-display');
  wd.textContent = word || '\u00a0';
  wd.className = '';
  
  // Draw connectors
  drawConnectors();
}

function drawConnectors() {
  const svg = document.getElementById('connector-svg');
  svg.innerHTML = '';
  if (selected.length < 2) return;
  
  const gridEl = document.getElementById('letter-grid');
  const cells = gridEl.querySelectorAll('.letter-cell');
  const gridRect = gridEl.getBoundingClientRect();
  const svgRect = document.getElementById('grid-wrap').getBoundingClientRect();
  
  for (let i = 0; i < selected.length - 1; i++) {
    const a = cells[selected[i]].getBoundingClientRect();
    const b = cells[selected[i+1]].getBoundingClientRect();
    const x1 = a.left + a.width/2 - svgRect.left;
    const y1 = a.top + a.height/2 - svgRect.top;
    const x2 = b.left + b.width/2 - svgRect.left;
    const y2 = b.top + b.height/2 - svgRect.top;
    
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#ff00ff');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-opacity', '0.6');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  }
}

function clearSelection() {
  selected = [];
  updateSelectionUI();
  setStatus("SELECTION CLEARED");
}

// ── WORD SUBMISSION ──────────────────────────────────────────────────────
function submitWord() {
  const word = selected.map(i => letters[i]).join('').toLowerCase();
  const wd = document.getElementById('word-display');
  
  if (word.length < 3) {
    setStatus("MINIMUM 3 LETTERS — TRY AGAIN");
    shakeWordDisplay();
    selected = [];
    updateSelectionUI();
    return;
  }
  
  if (foundWords.has(word)) {
    setStatus("ALREADY FOUND: " + word.toUpperCase());
    wd.className = 'invalid';
    setTimeout(() => { wd.className = ''; }, 500);
    selected = [];
    updateSelectionUI();
    return;
  }
  
  if (WORD_LIST.has(word)) {
    // Valid word!
    foundWords.add(word);
    const pts = calcPoints(word);
    score += pts;
    updateScoreDisplay();
    showScoreFlash(pts, word);
    addFoundWord(word);
    
    wd.className = 'valid';
    
    const catReactions = ["😺 MOCHKIL APPROVES", "😸 AZUL IS IMPRESSED", "🐾 PURRFECT WORD", "✨ REALITY SYNCED", "🌀 CHAOS ACCEPTED", "💜 CAT APPROVED"];
    setStatus(catReactions[Math.floor(Math.random() * catReactions.length)] + " +" + pts);
    
    if (word.length >= 6) {
      document.body.classList.add('glitching');
      setTimeout(() => document.body.classList.remove('glitching'), 400);
    }
    
    document.getElementById('found-count').textContent = foundWords.size;
    
    // Check round complete
    const needed = ROUND_WORDS_NEEDED[Math.min(round - 1, ROUND_WORDS_NEEDED.length - 1)];
    if (foundWords.size >= needed) {
      setTimeout(() => showRoundComplete(), 600);
    }
  } else {
    setStatus("NOT A WORD — MOCHKIL JUDGED YOU");
    wd.className = 'invalid';
    setTimeout(() => { wd.className = ''; }, 500);
  }
  
  selected = [];
  setTimeout(updateSelectionUI, 100);
}

function calcPoints(word) {
  const len = word.length;
  if (len === 3) return 1;
  if (len === 4) return 2;
  if (len === 5) return 4;
  if (len === 6) return 7;
  if (len === 7) return 12;
  return 20; // 8+
}

function shakeWordDisplay() {
  const wd = document.getElementById('word-display');
  wd.className = 'invalid';
  setTimeout(() => { wd.className = ''; }, 400);
}

// ── FOUND WORDS UI ───────────────────────────────────────────────────────
function addFoundWord(word) {
  const container = document.getElementById('found-words');
  const span = document.createElement('span');
  span.className = 'found-word found-' + (word.length >= 6 ? '6plus' : word.length);
  span.textContent = word.toUpperCase();
  container.appendChild(span);
}

// ── SCORE FLASH ──────────────────────────────────────────────────────────
function showScoreFlash(pts, word) {
  const flash = document.createElement('div');
  flash.className = 'score-flash';
  flash.style.color = pts >= 7 ? '#00ff88' : pts >= 4 ? '#ffff00' : '#00ffff';
  flash.style.left = (Math.random() * 60 + 20) + '%';
  flash.style.top = '40%';
  flash.textContent = '+' + pts + (pts >= 7 ? ' 🔥' : '');
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 1000);
}

// ── SCORE DISPLAY ────────────────────────────────────────────────────────
function updateScoreDisplay() {
  document.getElementById('score-disp').textContent = score;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('wordchaos_hs', highScore);
    document.getElementById('best-disp').textContent = highScore;
  }
}

// ── TIMER ────────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = BASE_TIME; // Use the constant you created
  updateTimerBar();
  
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerBar();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      triggerTimeOut();
    }
  }, 1000);
}

function updateTimerBar() {
  const pct = (timeLeft / BASE_TIME) * 100; // Use the constant here too
  const bar = document.getElementById('timer-bar');
  bar.style.width = pct + '%';
  bar.className = pct < 25 ? 'danger' : '';
}


function triggerTimeOut() {
  gameOver = true;
  clearInterval(timerInterval);
  showOverlay(false);
}

// ── SHUFFLE ──────────────────────────────────────────────────────────────
function shuffleBoard() {
  for (let i = letters.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [letters[i], letters[j]] = [letters[j], letters[i]];
  }
  selected = [];
  renderGrid();
  updateSelectionUI();
  setStatus("CHAOS RESHUFFLED — MOCHKIL APPROVES");
}

// ── ROUND / GAME FLOW ────────────────────────────────────────────────────
function showRoundComplete() {
  clearInterval(timerInterval);
  showOverlay(true);
}

function showOverlay(win) {
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlay-title');
  const scoreEl = document.getElementById('overlay-score');
  const wordsEl = document.getElementById('overlay-words');
  const catEl = document.querySelector('#overlay .overlay-cat') || document.getElementById('overlay').querySelector(':first-child');
  const btn = document.getElementById('overlay-btn');
  
  if (win) {
    title.textContent = 'ROUND ' + round + ' CLEARED!';
    title.style.color = '#00ff88';
    title.style.textShadow = '0 0 20px #00ff88, 0 0 60px #00ff88';
    document.querySelector('#overlay-cat') ? null : null;
    document.getElementById('overlay').querySelector('div:first-child').textContent = round >= 5 ? '🏆' : '😸';
    if (round >= 5) {
      title.textContent = 'MAXIMUM REALITY ACHIEVED!';
      btn.textContent = 'PLAY AGAIN';
      btn.onclick = restartGame;
    } else {
      btn.textContent = 'NEXT ROUND →';
      btn.onclick = nextRound;
    }
  } else {
    title.textContent = 'TIME\'S UP!';
    title.style.color = '#ff4444';
    title.style.textShadow = '0 0 20px #ff4444';
    document.getElementById('overlay').querySelector('div:first-child').textContent = '😿';
    btn.textContent = 'TRY AGAIN';
    btn.onclick = restartGame;
  }
  
  scoreEl.textContent = 'SCORE: ' + score + '  |  ROUND: ' + round;
  wordsEl.textContent = 'WORDS FOUND: ' + Array.from(foundWords).join(', ');
  overlay.classList.add('active');
}

function nextRound() {
  round++;
  foundWords = new Set();
  selected = [];
  gameOver = false;
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('found-words').innerHTML = '';
  document.getElementById('found-count').textContent = '0';
  document.getElementById('round-num').textContent = round;
  document.getElementById('words-needed').textContent = ROUND_WORDS_NEEDED[Math.min(round - 1, ROUND_WORDS_NEEDED.length - 1)];
  generateBoard();
  renderGrid();
  updateSelectionUI();
  setStatus("ROUND " + round + " — FIND " + ROUND_WORDS_NEEDED[Math.min(round - 1, ROUND_WORDS_NEEDED.length - 1)] + " WORDS");
  startTimer();
}

function restartGame() {
  round = 1;
  score = 0;
  foundWords = new Set();
  selected = [];
  gameOver = false;
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('found-words').innerHTML = '';
  document.getElementById('found-count').textContent = '0';
  document.getElementById('score-disp').textContent = '0';
  document.getElementById('round-num').textContent = '1';
  document.getElementById('words-needed').textContent = ROUND_WORDS_NEEDED[0];
  generateBoard();
  renderGrid();
  updateSelectionUI();
  setStatus("SELECT ADJACENT LETTERS TO BUILD WORDS");
  startTimer();
}

// ── STATUS ────────────────────────────────────────────────────────────────
let statusTimeout;
function setStatus(msg) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => {
    el.textContent = "SELECT ADJACENT LETTERS TO BUILD WORDS";
  }, 3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('best-disp').textContent = highScore;
document.getElementById('words-needed').textContent = ROUND_WORDS_NEEDED[0];
document.getElementById('status-msg').textContent = "LOADING DICTIONARY...";

function expandWords(words) {
  const result = new Set();
  const vowels = new Set('aeiou');

  words.forEach(w => {
    w = w.toLowerCase().trim();
    if (!w || w.length < 3) return;
    result.add(w);

    const last = w[w.length - 1];
    const secondLast = w[w.length - 2] || '';
    const endsInE = last === 'e';
    const endsInConsonantY = last === 'y' && !vowels.has(secondLast);
    const endsInS = last === 's';
    const endsInX = last === 'x';
    const endsInCh = w.endsWith('ch');
    const endsInSh = w.endsWith('sh');
    // Double final consonant for short vowel words e.g. stop→stopping
    const shouldDouble = !vowels.has(last) && vowels.has(secondLast) && w.length >= 3;

    // Skip words already ending in s/x/ch/sh — they need special handling anyway
    if (endsInS || endsInX || endsInCh || endsInSh) return;

    // ── Plurals / 3rd person ─────────────────────────────
    if (endsInConsonantY) {
      result.add(w.slice(0, -1) + 'ies'); // carry → carries
    } else {
      result.add(w + 's');                 // cat → cats, race → races
    }

    // ── Past tense ───────────────────────────────────────
    if (endsInE) {
      result.add(w + 'd');                 // race → raced
    } else if (endsInConsonantY) {
      result.add(w.slice(0, -1) + 'ied'); // carry → carried
    } else if (shouldDouble) {
      result.add(w + last + 'ed');         // stop → stopped
    } else {
      result.add(w + 'ed');               // walk → walked
    }

    // ── Present participle ───────────────────────────────
    if (endsInE) {
      result.add(w.slice(0, -1) + 'ing'); // race → racing
    } else if (shouldDouble) {
      result.add(w + last + 'ing');        // stop → stopping
    } else {
      result.add(w + 'ing');              // walk → walking
    }

    // ── Comparatives (short words only) ─────────────────
    if (w.length <= 5 && !endsInConsonantY) {
      if (endsInE) {
        result.add(w + 'r');              // nice → nicer
        result.add(w + 'st');             // nice → nicest
      } else if (shouldDouble) {
        result.add(w + last + 'er');      // big → bigger
        result.add(w + last + 'est');     // big → biggest
      } else {
        result.add(w + 'er');             // fast → faster
        result.add(w + 'est');            // fast → fastest
      }
    }
  });

  return Array.from(result);
}

fetch('dictionary.json')
  .then(r => r.json())
  .then(dict => {
    const baseWords = Object.values(dict.categories).flat();
    const expanded = expandWords(baseWords);
    WORD_LIST = new Set(expanded);
    console.log(`Dictionary loaded: ${baseWords.length} base words → ${WORD_LIST.size} with endings`);
    document.getElementById('status-msg').textContent = "SELECT ADJACENT LETTERS TO BUILD WORDS";
    generateBoard();
    renderGrid();
    startTimer();
  })
  .catch(err => {
    console.error('Failed to load dictionary.json:', err);
    document.getElementById('status-msg').textContent = "DICTIONARY NOT FOUND — CHECK FILE PATH";
  });
