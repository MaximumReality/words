<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Maximum Reality - Safari Fix</title>
<style>
  /* STOP ALL GESTURES AT THE ROOT */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none; /* No pinch, no double tap, no scroll */
    background-color: #0d0d15;
    -webkit-text-size-adjust: 100%; /* Stop font-size zooming */
  }

  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Container to keep the game from moving */
 /* Updated Stage: Works on skinny and wide screens */
  .stage {
    position: relative;
    width: 95vw;       /* Take up 95% of the phone width */
    max-width: 600px;  /* But never get bigger than 600px */
    height: 250px;
    background: linear-gradient(#87ceeb 70%, #3fa63f 70%);
    border: 4px solid #1f1f2e;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    touch-action: none;
  }


    .cat {
    position: absolute;
    left: 20px;        /* Moved slightly closer to the edge */
    bottom: 50px;
    font-size: 40px;
    transform: scaleX(-1);
    z-index: 10;
    transition: transform 0.1s linear;
  }

  .skateboarding::after {
    content: '🛹';
    position: absolute; bottom: -18px; left: 0px; font-size: 32px; transform: scaleX(-1);
  }

  .entity { position: absolute; font-size: 32px; z-index: 5; }
  
  .score {
    position: absolute; top: 15px; left: 20px; color: white;
    font-size: 18px; font-weight: bold; z-index: 20;
    background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 15px;
  }

  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); display: none; justify-content: center;
    align-items: center; color: white; flex-direction: column; z-index: 100;
  }

  .loading-area { margin-top: 20px; color: #00f2ff; text-align: center; }
</style>
</head>
<body>

<div class="stage" id="gameStage">
  <div class="score">FISH: <span id="scoreVal">0</span></div>
  <div class="cat" id="cat">🐈‍⬛</div>
  <div class="overlay" id="gameOver">
    <h2 style="color: #ff4d4d;">MEW-VER!</h2>
    <p>Tap to Restart</p>
  </div>
</div>

<div class="loading-area">
  <div style="font-size:24px; animation: spin 2s infinite linear;">⏳</div>
  <div style="letter-spacing: 2px; font-weight:bold;">MAXIMUM REALITY</div>
  <div style="font-size: 10px; opacity: 0.5; margin-top: 5px;">(TAP TO JUMP & START AUDIO)</div>
</div>

<script>
/* --- AUDIO ENGINE --- */
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playNote(freq, type = 'sine') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

/* --- GAME STATE --- */
const stage = document.getElementById('gameStage');
const cat = document.getElementById('cat');
const scoreEl = document.getElementById('scoreVal');
const overlay = document.getElementById('gameOver');

let score = 0, isJumping = false, catY = 0, velocity = 0, gameActive = true, skateboard = false;
let obstacles = [], items = [];

// THE FIX: Listen for touchstart and STOP EVERYTHING ELSE
stage.addEventListener('touchstart', function(e) {
  e.preventDefault(); // Stop zoom/scroll
  initAudio(); // Initialize audio on first tap
  if (!gameActive) reset(); else jump();
}, { passive: false });

function jump() {
  if (!isJumping && gameActive) {
    isJumping = true;
    velocity = 12;
    playNote(600, 'triangle');
  }
}

function update() {
  if (!gameActive) return;

  if (isJumping) {
    catY += velocity;
    velocity -= 0.6;
    if (catY <= 0) { catY = 0; isJumping = false; }
  }
  cat.style.bottom = (50 + catY) + "px";
  cat.style.transform = `scaleX(-1) rotate(${isJumping ? velocity * -2 : 0}deg)`;

  const speed = skateboard ? 10 : 7;
  
  [obstacles, items].forEach(list => {
    for (let i = list.length - 1; i >= 0; i--) {
      const o = list[i];
      o.x -= speed;
      o.el.style.left = o.x + 'px';

      const cR = cat.getBoundingClientRect();
      const oR = o.el.getBoundingClientRect();

      if (cR.right > oR.left + 15 && cR.left < oR.right - 15 && cR.bottom > oR.top + 10 && cR.top < oR.bottom - 10) {
        if (o.type === 'fish') {
          score++; scoreEl.innerText = score;
          playNote(900, 'sine');
          remove(o, list, i);
        } else if (o.type === 'skate') {
          skateboard = true; cat.classList.add('skateboarding');
          playNote(400, 'square');
          setTimeout(() => { skateboard = false; cat.classList.remove('skateboarding'); }, 5000);
          remove(o, list, i);
        } else if (o.type === 'trap' && !skateboard) {
          gameActive = false; overlay.style.display = 'flex';
          playNote(150, 'sawtooth');
        }
      }
      if (o.x < -60) remove(o, list, i);
    }
  });

  if (Math.random() < 0.02) spawn();
  requestAnimationFrame(update);
}

function spawn() {
  const r = Math.random();
  // Get the CURRENT width of the stage so we spawn at the right edge
  const spawnX = stage.clientWidth + 20; 

  if (r < 0.4) create(['🕳️','🪨','🪵'][Math.floor(Math.random()*3)], 'trap', 45, spawnX);
  else if (r < 0.8) create('🐟', 'fish', 140 + Math.random()*50, spawnX);
  else if (!skateboard) create('🛹', 'skate', 50, spawnX);
}

function create(char, type, y, startX) {
  const el = document.createElement('div');
  el.className = 'entity'; 
  el.innerHTML = char;
  el.style.bottom = y + 'px'; 
  el.style.left = startX + 'px'; // Use the dynamic start position
  stage.appendChild(el);
  
  const list = (type === 'trap' ? obstacles : items);
  list.push({ el, type, x: startX });
}
function remove(obj, list, index) { obj.el.remove(); list.splice(index, 1); }

function reset() {
  [...obstacles, ...items].forEach(o => o.el.remove());
  obstacles = []; items = []; score = 0; scoreEl.innerText = 0;
  catY = 0; velocity = 0; isJumping = false; gameActive = true;
  overlay.style.display = 'none';
  update();
}

window.addEventListener('keydown', e => { if(e.code === 'Space') { e.preventDefault(); jump(); } });
update();
</script>

<style>
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>

</body>
</html>
