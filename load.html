<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cat Runner Pro - Maximum Reality Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #0d0d15;
    background-image:
      radial-gradient(circle at 20% 30%, #161625 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, #161625 0%, transparent 40%);
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    overflow: hidden;
  }

  /* --- GAME BOX --- */
  .game {
    position: relative;
    width: 600px;
    height: 250px;
    background: linear-gradient(#87ceeb 70%, #3fa63f 70%);
    overflow: hidden;
    border: 8px solid #1f1f2e;
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.9);
    cursor: pointer;
  }

  /* --- CLOUDS --- */
  .cloud {
    position: absolute;
    font-size: 50px;
    opacity: 0.8;
    z-index: 1;
    pointer-events: none;
    animation: drift linear infinite;
  }

  @keyframes drift {
    from { left: 650px; }
    to   { left: -150px; }
  }

  /* --- CAT --- */
  .cat {
    position: absolute;
    left: 50px;
    bottom: 50px;
    font-size: 44px;
    z-index: 10;
    user-select: none;
    transform: scaleX(-1);
    display: inline-block;
    transition: transform 0.1s linear;
  }

  .skateboarding::after {
    content: '🛹';
    position: absolute;
    bottom: -18px;
    left: 0px;
    font-size: 32px;
    transform: scaleX(-1);
  }

  .entity {
    position: absolute;
    font-size: 32px;
    user-select: none;
    z-index: 5;
  }

  .sparkle {
    position: absolute;
    font-size: 20px;
    animation: sparkleUp 0.8s ease-out forwards;
    pointer-events: none;
    z-index: 15;
  }

  @keyframes sparkleUp {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(-50px) scale(1.8); }
  }

  .score-board {
    position: absolute;
    top: 15px;
    left: 20px;
    color: white;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
    z-index: 20;
    background: rgba(0,0,0,0.3);
    padding: 5px 12px;
    border-radius: 15px;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    color: white;
    flex-direction: column;
    z-index: 100;
    text-align: center;
  }

  /* --- LOADING AREA --- */
  .loading-area {
    margin-top: 25px;
    text-align: center;
    color: #00f2ff;
  }

  .hourglass {
    font-size: 30px;
    animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
    display: inline-block;
    margin-bottom: 5px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(180deg); }
  }

  .loading-text {
    font-size: 16px;
    letter-spacing: 4px;
    font-weight: bold;
    text-transform: uppercase;
  }

  .hint {
    margin-top: 10px;
    color: #444455;
    font-size: 11px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="game" id="game" onmousedown="handleClick()">
  <div class="score-board">
    FISH: <span id="score">0</span> | BEST: <span id="best">0</span>
  </div>
  
  <div class="cat" id="cat">🐈‍⬛</div>

  <div class="cloud" style="top:15px; animation-duration:35s; font-size: 60px;">☁️</div>
  <div class="cloud" style="top:50px; animation-duration:22s; animation-delay: -10s;">⛅</div>
  <div class="cloud" style="top:80px; animation-duration:45s; animation-delay: -5s;">☁️</div>

  <div class="overlay" id="gameOver">
    <h2 style="font-size: 36px; color: #ff4d4d; margin-bottom: 10px;">MEW-VER!</h2>
    <p id="finalScore" style="font-size: 18px; margin-bottom: 20px;"></p>
    <p style="color: #00f2ff; font-weight: bold;">TAP TO RESTART</p>
  </div>
</div>

<div class="loading-area">
  <div class="hourglass">⏳</div>
  <div class="loading-text">MAXIMUM REALITY</div>
</div>

<div class="hint">SPACEBAR / CLICK TO JUMP</div>

<script>
/* --- SOUNDS --- */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, duration, type='sine', volume=0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration/1000);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration/1000);
}

/* --- GAME STATE --- */
const game = document.getElementById('game');
const cat = document.getElementById('cat');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const gameOverScreen = document.getElementById('gameOver');

let score = 0;
let highScore = localStorage.getItem('catHighScore') || 0;
bestEl.innerText = highScore;

let isJumping = false;
let catY = 0;
let velocity = 0;
let onSkateboard = false;
let gameActive = true;

const gravity = -0.58;
const jumpPower = 12;
const groundLevel = 50;

let obstacles = [];
let items = [];

function spawnSparkles(x, y) {
  const emojis = ['✨','💫','🌟','🐟'];
  for (let i = 0; i < 5; i++) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    sp.style.left = (x + Math.random()*40 - 20) + 'px';
    sp.style.bottom = (y + Math.random()*40 - 20) + 'px';
    game.appendChild(sp);
    setTimeout(() => sp.remove(), 800);
  }
}

function spawnEntity() {
  if (!gameActive) return;
  const rand = Math.random();
  if (rand < 0.018) {
    const types = ['🕳️','🪨','🪵'];
    createEntity(types[Math.floor(Math.random()*types.length)], 'obstacle', 45);
  } else if (rand < 0.035) {
    createEntity('🐟', 'fish', 135 + Math.random()*55);
  } else if (rand < 0.04 && !onSkateboard) {
    createEntity('🛹', 'powerup', 50);
  }
}

function createEntity(char, type, y) {
  const el = document.createElement('div');
  el.className = 'entity';
  el.innerHTML = char;
  el.style.bottom = y + 'px';
  el.style.left = '620px';
  game.appendChild(el);
  const obj = { el, type, x: 620, y };
  if (type === 'obstacle') obstacles.push(obj);
  else items.push(obj);
}

function jump() {
  if (!isJumping && gameActive) {
    isJumping = true;
    velocity = jumpPower;
    playTone(550, 150, 'sine');
  }
}

function update() {
  if (!gameActive) return;

  if (isJumping) {
    catY += velocity;
    velocity += gravity;
    if (catY <= 0) {
      catY = 0;
      isJumping = false;
      playTone(150, 50, 'sine', 0.05); // Landing thud
    }
  }

  cat.style.bottom = (groundLevel + catY) + "px";
  // Smooth rotation logic
  let rot = isJumping ? (velocity * -2.5) : 0;
  cat.style.transform = `scaleX(-1) rotate(${rot}deg)`;

  const speed = onSkateboard ? 9.5 : 6.5;

  [obstacles, items].forEach((list) => {
    for (let i = list.length - 1; i >= 0; i--) {
      const o = list[i];
      o.x -= speed;
      o.el.style.left = o.x + 'px';

      const catRect = cat.getBoundingClientRect();
      const objRect = o.el.getBoundingClientRect();

      const overlap =
        catRect.right > objRect.left + 15 &&
        catRect.left < objRect.right - 15 &&
        catRect.bottom > objRect.top + 10 &&
        catRect.top < objRect.bottom - 10;

      if (overlap) {
        if (o.type === 'fish') {
          score++;
          scoreEl.innerText = score;
          playTone(880, 100, 'triangle');
          spawnSparkles(catRect.left + 20, 250 - catRect.bottom + 40);
          removeEntity(o, list, i);
        } else if (o.type === 'powerup') {
          activateSkateboard();
          playTone(440, 400, 'sawtooth', 0.05);
          removeEntity(o, list, i);
        } else if (o.type === 'obstacle' && !onSkateboard) {
          playTone(100, 300, 'square');
          endGame();
        }
      }
      if (o.x < -60) removeEntity(o, list, i);
    }
  });

  spawnEntity();
  requestAnimationFrame(update);
}

function removeEntity(obj, list, index) {
  obj.el.remove();
  list.splice(index, 1);
}

function activateSkateboard() {
  onSkateboard = true;
  cat.classList.add('skateboarding');
  setTimeout(() => {
    onSkateboard = false;
    cat.classList.remove('skateboarding');
  }, 6000);
}

function endGame() {
  gameActive = false;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('catHighScore', highScore);
    bestEl.innerText = highScore;
  }
  document.getElementById('finalScore').innerText = `You caught ${score} fish!`;
  gameOverScreen.style.display = 'flex';
}

function reset() {
  obstacles.forEach(o => o.el.remove());
  items.forEach(i => i.el.remove());
  obstacles = []; items = [];
  score = 0; scoreEl.innerText = 0;
  catY = 0; velocity = 0; isJumping = false;
  gameActive = true;
  gameOverScreen.style.display = 'none';
  update();
}

function handleClick() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!gameActive) reset();
  else jump();
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); handleClick(); }
});

update();
</script>

</body>
</html>
