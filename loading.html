<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cat Loading Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #87ceeb; /* blue sky */
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }

  .loading-text {
    margin-bottom: 12px;
    color: #ffffff;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }

  .game {
    position: relative;
    width: 480px;
    max-width: 100vw;
    height: 200px;
    overflow: hidden;
    border-radius: 12px;
    background: #87ceeb;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .grass {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 40px;
    background: repeating-linear-gradient(
      to right,
      #3fa63f 0,
      #3fa63f 20px,
      #2f8c2f 20px,
      #2f8c2f 40px
    );
    animation: grassMove 0.6s linear infinite;
  }

  @keyframes grassMove {
    from { transform: translateX(0); }
    to { transform: translateX(-40px); }
  }

  .cat {
    position: absolute;
    left: 60px;
    bottom: 40px;
    font-size: 48px;
    transform: scaleX(-1); /* face right */
  }

  .fish {
    position: absolute;
    right: -60px;
    bottom: 40px;
    font-size: 40px;
  }

  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: #ffffff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<div class="loading-text">Loading… Catch the fish</div>

<div class="game" id="game">
  <div class="grass"></div>
  <div class="cat" id="cat">🐈‍⬛</div>
  <div class="fish" id="fish">🐟</div>
</div>

<div class="hint">Tap / click / press space to jump</div>

<script>
  const cat = document.getElementById("cat");
  const fish = document.getElementById("fish");
  const game = document.getElementById("game");

  let isJumping = false;
  let velocity = 0;
  let catY = 0;
  const gravity = -0.6;
  const jumpPower = 11;
  const maxJump = 110;

  let fishX = game.clientWidth;
  const fishSpeed = 4;

  function jump() {
    if (isJumping) return;
    isJumping = true;
    velocity = jumpPower;
  }

  function updateCat() {
    if (isJumping) {
      catY += velocity;
      velocity += gravity;

      if (catY <= 0) {
        catY = 0;
        isJumping = false;
        velocity = 0;
      }
      if (catY > maxJump) catY = maxJump;
    }
    cat.style.bottom = (40 + catY) + "px";
  }

  function resetFish() {
    fishX = game.clientWidth + Math.random() * 120;
  }

  function updateFish() {
    fishX -= fishSpeed;
    if (fishX < -60) resetFish();
    fish.style.right = (game.clientWidth - fishX) + "px";
  }

  function checkCatch() {
    const catRect = cat.getBoundingClientRect();
    const fishRect = fish.getBoundingClientRect();

    const overlap =
      catRect.left < fishRect.right &&
      catRect.right > fishRect.left &&
      catRect.top < fishRect.bottom &&
      catRect.bottom > fishRect.top;

    if (overlap) {
      fish.style.opacity = "0.2";
      setTimeout(() => fish.style.opacity = "1", 150);
      resetFish();
    }
  }

  function loop() {
    updateCat();
    updateFish();
    checkCatch();
    requestAnimationFrame(loop);
  }

  game.addEventListener("click", jump);
  window.addEventListener("keydown", e => {
    if (e.code === "Space") {
      e.preventDefault();
      jump();
    }
  });

  resetFish();
  loop();
</script>

</body>
</html>
