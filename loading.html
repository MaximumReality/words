<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cat Runner Pro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2c3e50;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  .loading-text {
    margin-bottom: 12px;
    color: #ecf0f1;
    font-size: 18px;
    font-weight: bold;
    text-transform: uppercase;
  }

  .game {
    position: relative;
    width: 600px;
    height: 250px;
    background: linear-gradient(#87ceeb 70%, #3fa63f 70%);
    overflow: hidden;
    border: 4px solid #fff;
    border-radius: 8px;
  }

  .cat {
    position: absolute;
    left: 50px;
    bottom: 50px;
    font-size: 40px;
    z-index: 10;
    transition: transform 0.1s;
  }

  .skateboarding {
    transform: scaleX(-1) translateY(5px);
  }

  .skateboarding::after {
    content: '🛹';
    position: absolute;
    bottom: -15px;
    left: 5px;
    font-size: 30px;
  }

  .entity {
    position: absolute;
    font-size: 30px;
    user-select: none;
  }

  .score-board {
    position: absolute;
    top: 10px;
    right: 20px;
    color: white;
    font-size: 20px;
    text-shadow: 2px 2px 0 #000;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    color: white;
    flex-direction: column;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="loading-text" id="status">Crunching Data...</div>

<div class="game" id="game">
  <div class="score-board">Fish: <span id="score">0</span></div>
  <div class="cat" id="cat">🐈‍⬛</div>
  <div class="overlay" id="gameOver">
    <h2>Ouch!</h2>
    <p>Click to Try Again</p>
  </div>
</div>

<script>
  const game = document.getElementById('game');
  const cat = document.getElementById('cat');
  const scoreEl = document.getElementById('score');
  const gameOverScreen = document.getElementById('gameOver');

  let score = 0;
  let isJumping = false;
  let catY = 0;
  let velocity = 0;
  let onSkateboard = false;
  let gameActive = true;

  const gravity = -0.5;
  const jumpPower = 12;
  const groundLevel = 50;

  // Game State Arrays
  let obstacles = [];
  let items = [];

  function spawnEntity() {
    if (!gameActive) return;
    
    const rand = Math.random();
    if (rand < 0.02) { // Spawn Obstacle (Hole, Rock, Log)
      const types = ['🕳️', '🪨', '🪵'];
      createEntity(types[Math.floor(Math.random() * types.length)], 'obstacle', 45);
    } else if (rand < 0.04) { // Spawn Fish (High up)
      createEntity('🐟', 'fish', 130 + Math.random() * 50);
    } else if (rand < 0.045 && !onSkateboard) { // Spawn Skateboard
      createEntity('🛹', 'powerup', 50);
    }
  }

  function createEntity(char, type, y) {
    const el = document.createElement('div');
    el.className = 'entity';
    el.innerHTML = char;
    el.style.bottom = y + 'px';
    el.style.left = '620px';
    game.appendChild(el);
    
    const obj = { el, type, x: 620, y, width: 30 };
    if (type === 'obstacle') obstacles.push(obj);
    else items.push(obj);
  }

  function jump() {
    if (!isJumping) {
      isJumping = true;
      velocity = jumpPower;
    }
  }

  function update() {
    if (!gameActive) return;

    // Physics
    if (isJumping) {
      catY += velocity;
      velocity += gravity;
      if (catY <= 0) {
        catY = 0;
        isJumping = false;
      }
    }
    cat.style.bottom = (groundLevel + catY) + 'px';

    // Move Entities
    const speed = onSkateboard ? 8 : 5;
    
    [obstacles, items].forEach((list, listIdx) => {
      for (let i = list.length - 1; i >= 0; i--) {
        const o = list[i];
        o.x -= speed;
        o.el.style.left = o.x + 'px';

        // Collision Detection
        const catRect = cat.getBoundingClientRect();
        const objRect = o.el.getBoundingClientRect();

        if (catRect.right > objRect.left + 10 && 
            catRect.left < objRect.right - 10 && 
            catRect.bottom > objRect.top + 10 && 
            catRect.top < objRect.bottom - 10) {
          
          if (o.type === 'fish') {
            score++;
            scoreEl.innerText = score;
            removeEntity(o, list, i);
          } else if (o.type === 'powerup') {
            activateSkateboard();
            removeEntity(o, list, i);
          } else if (o.type === 'obstacle' && !onSkateboard) {
            endGame();
          }
        }

        if (o.x < -50) removeEntity(o, list, i);
      }
    });

    spawnEntity();
    requestAnimationFrame(update);
  }

  function removeEntity(obj, list, index) {
    obj.el.remove();
    list.splice(index, 1);
  }

  function activateSkateboard() {
    onSkateboard = true;
    cat.classList.add('skateboarding');
    setTimeout(() => {
      onSkateboard = false;
      cat.classList.remove('skateboarding');
    }, 6000);
  }

  function endGame() {
    gameActive = false;
    gameOverScreen.style.display = 'flex';
  }

  function reset() {
    obstacles.forEach(o => o.el.remove());
    items.forEach(i => i.el.remove());
    obstacles = [];
    items = [];
    score = 0;
    scoreEl.innerText = 0;
    gameActive = true;
    gameOverScreen.style.display = 'none';
    update();
  }

  window.addEventListener('keydown', e => { if(e.code === 'Space') jump(); });
  game.addEventListener('touchstart', jump);
  game.addEventListener('mousedown', () => { if(!gameActive) reset(); else jump(); });

  update();
</script>

</body>
</html>
