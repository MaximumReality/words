<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cat Runner Loading</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .loading-text {
      margin-bottom: 16px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9ca3af;
    }

    .game-container {
      position: relative;
      width: 480px;
      max-width: 100vw;
      height: 180px;
      border-radius: 12px;
      background: linear-gradient(to top, #020617, #0b1220);
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(148,163,184,0.3);
    }

    .ground {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 200%;
      height: 32px;
      background-image: linear-gradient(
        to right,
        #111827 0,
        #111827 16px,
        #020617 16px,
        #020617 32px
      );
      background-size: 32px 32px;
      animation: ground-scroll 0.6s linear infinite;
    }

    @keyframes ground-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-32px); }
    }

    .cat {
      position: absolute;
      left: 60px;
      bottom: 32px;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #f97316;
      box-shadow: 0 0 0 2px #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .cat::before {
      content: "🐱";
      transform: translateY(-2px);
    }

    .obstacle {
      position: absolute;
      right: -40px;
      bottom: 32px;
      width: 26px;
      height: 40px;
      border-radius: 8px;
      background: #22c55e;
      box-shadow: 0 0 0 2px #111827;
    }

    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(248,250,252,0.4) 1px, transparent 0),
        radial-gradient(circle at 80% 30%, rgba(248,250,252,0.3) 1px, transparent 0),
        radial-gradient(circle at 40% 70%, rgba(248,250,252,0.25) 1px, transparent 0);
      background-size: 120px 120px;
      opacity: 0.4;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
    }

    @media (max-width: 520px) {
      .game-container {
        width: 100%;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="loading-text">Loading… enjoy the cat run</div>
  <div class="game-container" id="game">
    <div class="stars"></div>
    <div class="ground"></div>
    <div class="cat" id="cat"></div>
    <div class="obstacle" id="obstacle"></div>
  </div>
  <div class="hint">Tap / click / press space to jump</div>

  <script>
    const cat = document.getElementById("cat");
    const obstacle = document.getElementById("obstacle");
    const game = document.getElementById("game");

    let isJumping = false;
    let velocityY = 0;
    let catY = 0;
    const gravity = -0.6;
    const jumpVelocity = 10;
    const groundHeight = 32;
    const catHeight = 40;
    const maxJump = 90; // max height above ground

    let obstacleX = game.clientWidth;
    const obstacleSpeed = 4;

    function jump() {
      if (isJumping) return;
      isJumping = true;
      velocityY = jumpVelocity;
    }

    function updateCat() {
      if (isJumping) {
        catY += velocityY;
        velocityY += gravity;

        if (catY <= 0) {
          catY = 0;
          isJumping = false;
          velocityY = 0;
        }
        if (catY > maxJump) {
          catY = maxJump;
        }
      }
      cat.style.bottom = groundHeight + catY + "px";
    }

    function resetObstacle() {
      obstacleX = game.clientWidth + Math.random() * 80;
    }

    function updateObstacle() {
      obstacleX -= obstacleSpeed;
      if (obstacleX < -40) {
        resetObstacle();
      }
      obstacle.style.right = (game.clientWidth - obstacleX) + "px";
    }

    function checkCollision() {
      const catRect = cat.getBoundingClientRect();
      const obsRect = obstacle.getBoundingClientRect();

      const overlap =
        catRect.left < obsRect.right &&
        catRect.right > obsRect.left &&
        catRect.bottom > obsRect.top &&
        catRect.top < obsRect.bottom;

      if (overlap) {
        // Simple "blink" reset effect
        cat.style.opacity = "0.3";
        setTimeout(() => { cat.style.opacity = "1"; }, 150);
        resetObstacle();
      }
    }

    function loop() {
      updateCat();
      updateObstacle();
      checkCollision();
      requestAnimationFrame(loop);
    }

    // Input: click/tap/space
    game.addEventListener("click", jump);
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.key === " ") {
        e.preventDefault();
        jump();
      }
    });

    resetObstacle();
    loop();
  </script>
</body>
</html>
